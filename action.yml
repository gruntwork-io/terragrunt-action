name: 'Gruntwork Terragrunt'
description: 'Setup and execute Terragrunt.'
author:  'Gruntwork'

branding:
  icon: 'award'
  color: 'purple'

inputs:
  tg_version:
    description: 'Terragrunt version to install (overrides mise.toml config file).'
    required: false
  tf_version:
    description: 'Terraform version to install (overrides mise.toml config file).'
    required: false
  tofu_version:
    description: 'OpenTofu version to install (overrides mise.toml config file).'
    required: false
  tf_path:
    description: 'Path to Terraform/OpenTofu binary to use. This is typically used to explicitly decide what binary to use when both are installed.'
    required: false
  tg_command:
    description: 'Terragrunt command to execute.'
    required: false
  tg_dir:
    description: 'Directory in which Terragrunt will be executed. Default is the current working dir'
    required: false
  tg_comment:
    description: 'Include execution output as comment'
    default: '0'
    required: false
  tg_add_approve:
    description: 'Add -auto-approve to commands which require it when not running interactively'
    default: '1'
    required: false
  tg_output_capture:
    description: 'Capture Terragrunt execution output as the `tg_action_output` action output'
    default: '1'
    required: false
  github_token:
    description: 'GitHub token for API authentication to avoid rate limits when installing tools'
    required: false

outputs:
  tg_action_output:
    description: 'Terragrunt execution output'
    value: ${{ steps.terragrunt-exec.outputs.tg_action_output }}
  tg_action_exit_code:
    description: 'Terragrunt exit code'
    value: ${{ steps.terragrunt-exec.outputs.tg_action_exit_code }}

runs:
  using: 'composite'
  steps:
    - name: Install tools
      if: ${{ inputs.tf_path == '' }}
      uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4
      with:
        version: 2025.6.8
        mise_toml: |
          [tools]
          ${{ inputs.tg_version && format('terragrunt = {0}', inputs.tg_version) || '' }}
          ${{ inputs.tf_version && format('terraform = {0}', inputs.tf_version) || '' }}
          ${{ inputs.tofu_version && format('opentofu = {0}', inputs.tofu_version) || '' }}
        github_token: ${{ inputs.github_token || github.token }}

    - name: Execute Terragrunt
      if: ${{ inputs.tg_command != '' }}
      id: terragrunt-exec
      run: ${{ github.action_path }}/src/main.sh
      shell: bash
      env:
        TG_NON_INTERACTIVE: true
        TF_IN_AUTOMATION: 1
        TG_TF_PATH: ${{ inputs.tf_path }}
        INPUT_TG_COMMAND: ${{ inputs.tg_command }}
        INPUT_TG_DIR: ${{ inputs.tg_dir }}
        INPUT_TG_COMMENT: ${{ inputs.tg_comment }}
        INPUT_TG_ADD_APPROVE: ${{ inputs.tg_add_approve }}
        INPUT_TG_OUTPUT_CAPTURE: ${{ inputs.tg_output_capture }}
